<!doctype html>
<html lang="pt-BR">
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatiple" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Primeira entrega - FrontEnd</title>
</html>
<!-- Conteudo: C++-->
<head>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background-color: #f4f4f4;
    }
    h1,
    h2 {
      text-align: center;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 20px;
      background: white;
    }
    th,
    td {
      border: 1px solid #ddd;
      padding: 8px;
      text-align: center;
    }
    th {
      background-color: #0073e6;
      color: white;
    }
    form {
      background: white;
      padding: 20px;
      border-radius: 5px;
      box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
      max-width: 500px;
      margin: auto;
    }
    label {
      font-weight: bold;
      display: block;
      margin-top: 10px;
    }
    input,
    select,
    textarea {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    input[type="submit"] {
      background-color: #0073e6;
      color: white;
      border: none;
      padding: 10px;
      cursor: pointer;
      margin-top: 10px;
    }
    input[type="submit"]:hover {
      background-color: #005bb5;
    }
  </style>
</head>
<body>
  <h1>Introdução a C++</h1>

  <h2>Tipagem em C++</h2>
  <table>
    <tr>
      <th>Ponteiros</th>
      <th>Cahce</th>
      <th>Data alocation</th>
    </tr>
    <tr>
      <td>João Silva</td>
      <td>28</td>
      <td>joao@email.com</td>
    </tr>
    <tr>
      <td>Maria Souza</td>
      <td>32</td>
      <td>maria@email.com</td>
    </tr>
  </table>
</body>
