<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatiple" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <title>My Links</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        min-height: 100vh;
        background: linear-gradient(135deg, #0f0c29, #1a1a2e, #16213e);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }

      .container {
        width: 100%;
        max-width: 440px;
      }

      /* Header */
      .header {
        text-align: center;
        margin-bottom: 2rem;
      }

      /* Avatar */
      .avatar {
        width: 110px;
        height: 110px;
        border-radius: 50%;
        margin: 0 auto 1.2rem;
        overflow: hidden;
        border: 3px solid rgba(99, 102, 241, 0.6);
        box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
      }

      .avatar img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .header h1 {
        color: #fff;
        font-size: 1.6rem;
        margin-bottom: 0.3rem;
      }

      .student-id {
        color: #a78bfa;
        font-size: 0.9rem;
        font-weight: 600;
        letter-spacing: 0.05em;
        margin-bottom: 0.2rem;
      }

      .tagline {
        color: #94a3b8;
        font-size: 0.95rem;
      }

      /* Link Cards */
      .links {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      .link-card {
        display: block;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 14px;
        padding: 1.1rem 1.4rem;
        text-decoration: none;
        transition: all 0.25s ease;
      }

      .link-card:hover {
        background: rgba(255, 255, 255, 0.1);
        border-color: #6366f1;
        transform: translateY(-3px);
        box-shadow: 0 8px 24px rgba(99, 102, 241, 0.15);
      }

      .link-card .title {
        color: #fff;
        font-size: 1.1rem;
        font-weight: 600;
      }

      .link-card .desc {
        color: #94a3b8;
        font-size: 0.85rem;
        margin-top: 0.3rem;
      }

      /* Footer */
      .footer {
        text-align: center;
        color: #475569;
        font-size: 0.8rem;
        margin-top: 2.5rem;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- Header -->
      <div class="header">
        <div class="avatar">
          <img src="Xerecanation\Chedha.jpeg" alt="Profile photo" />
        </div>
        <h1>Fernando Martinez</h1>
        <p class="student-id">RA: 25206821-2</p>
        <p class="tagline">Estudante e Alegre</p>
      </div>

      <!-- Links -->
      <div class="links">
        <a
          class="link-card"
          href="SiteAula\index.html"
          target="_blank"
          rel="noopener noreferrer"
        >
          <div class="title">Entrega 1</div>
          <div class="desc"> (Colecionador)</div>
        </a>

        <a
          class="link-card"
          href="Aula24fev\index.html"
          target="_blank"
          rel="noopener noreferrer"
        >
          <div class="title">Entrega 2 </div>
          <div class="desc">(Portifolio)</div>
        </a>

        <a
          class="link-card"
          href="EntregaHTML\index.html"
          target="_blank"
          rel="noopener noreferrer"
        >
          <div class="title">Entrega 3 </div>
          <div class="desc">(Guia de Estudo)</div>
        </a>
      </div>

      <!-- Footer -->
      <p class="footer">© 2026 XablauMaster017</p>
      <div style="text-align: center; margin-top: 1rem;">
       <a href="https://github.com/XablauMaster017" 
        target="_blank"
        rel="noopener noreferrer"
        style="color: #6366f1; font-size: 1.8rem">
        <i class="fa-brands fa-github"></i></a>
      </div>
   
     </p>
    </div>
    </a>
  </body>
</html>
