<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Links</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        min-height: 100vh;
        background: linear-gradient(135deg, #0f0c29, #1a1a2e, #16213e);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }

      .container {
        width: 100%;
        max-width: 440px;
      }

      /* Avatar */
      .avatar {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        background: linear-gradient(135deg, #6366f1, #a855f7);
        margin: 0 auto 1.2rem;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2rem;
        font-weight: 700;
        color: #fff;
        box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
      }

      .header {
        text-align: center;
        margin-bottom: 2rem;
      }

      .header h1 {
        color: #fff;
        font-size: 1.6rem;
        margin-bottom: 0.3rem;
      }

      .header p {
        color: #94a3b8;
        font-size: 0.95rem;
      }

      /* Link Cards */
      .links {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      .link-card {
        display: block;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 14px;
        padding: 1.1rem 1.4rem;
        text-decoration: none;
        transition: all 0.25s ease;
      }

      .link-card:hover {
        background: rgba(255, 255, 255, 0.1);
        border-color: #6366f1;
        transform: translateY(-3px);
        box-shadow: 0 8px 24px rgba(99, 102, 241, 0.15);
      }

      .link-card .title {
        color: #fff;
        font-size: 1.1rem;
        font-weight: 600;
      }

      .link-card .desc {
        color: #94a3b8;
        font-size: 0.85rem;
        margin-top: 0.3rem;
      }

      /* Footer */
      .footer {
        text-align: center;
        color: #475569;
        font-size: 0.8rem;
        margin-top: 2.5rem;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <div class="avatar" id="avatar"></div>
        <h1 id="name"></h1>
        <p id="tagline"></p>
      </div>
      <div class="links" id="links"></div>
      <p class="footer" id="footer"></p>
    </div>

    <script>
      // ===== EDIT YOUR INFO HERE =====
      const profile = {
        initials: "YN",
        name: "Your Name",
        tagline: "Developer & Creator",
      };

      // ===== EDIT YOUR LINKS HERE =====
      const links = [
        {
          title: "Portfolio",
          url: "https://example.com/portfolio",
          description: "My personal portfolio site",
        },
        {
          title: "Blog",
          url: "https://example.com/blog",
          description: "My tech blog",
        },
        {
          title: "Project Alpha",
          url: "https://example.com/project-alpha",
          description: "A cool side project",
        },
      ];

      // ===== Render =====
      document.getElementById("avatar").textContent = profile.initials;
      document.getElementById("name").textContent = profile.name;
      document.getElementById("tagline").textContent = profile.tagline;
      document.getElementById("footer").textContent =
        `© ${new Date().getFullYear()} ${profile.name}`;

      const linksContainer = document.getElementById("links");
      links.forEach((link) => {
        const a = document.createElement("a");
        a.href = link.url;
        a.target = "_blank";
        a.rel = "noopener noreferrer";
        a.className = "link-card";
        a.innerHTML = `
        <div class="title">${link.title}</div>
        <div class="desc">${link.description}</div>
      `;
        linksContainer.appendChild(a);
      });
    </script>
  </body>
</html>
